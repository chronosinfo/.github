name: Run Maven Tests

on:
  workflow_call:
    inputs:
      container-image:
        required: true
        type: string
      test-command:
        required: true
        type: string
      report-paths:
        required: false
        type: string
        default: ''
      check-name:
        required: false
        type: string
        default: 'Tests'
      jacoco-report:
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          path: src

      - name: Configurar Maven settings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          mkdir -p "${{ github.workspace }}/src/.mvn"
          cat > "${{ github.workspace }}/src/.mvn/ci-settings.xml" <<XMLEOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>$GITHUB_ACTOR</username>
                <password>$GITHUB_TOKEN</password>
              </server>
            </servers>
          </settings>
          XMLEOF

      - name: Run tests
        run: |
          docker run --rm --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "${{ github.workspace }}/src:/workspace" \
            -w /workspace \
            ${{ inputs.container-image }} \
            sh -c "${{ inputs.test-command }}"

      - name: Publicar resultados
        uses: mikepenz/action-junit-report@v4
        if: ${{ always() && inputs.report-paths != '' }}
        with:
          report_paths: ${{ inputs.report-paths }}
          check_name: ${{ inputs.check-name }}

      - name: Resumo de cobertura JaCoCo
        if: ${{ always() && inputs.jacoco-report }}
        run: |
          REPORT="${{ github.workspace }}/src/target/site/jacoco/jacoco.xml"
          if [ ! -f "$REPORT" ]; then
            echo "jacoco.xml não encontrado — cobertura não disponível" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          cat > /tmp/jacoco_summary.py << 'PYEOF'
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse(sys.argv[1])
          root = tree.getroot()
          print('### Cobertura JaCoCo\n')
          print('| Métrica | Coberto | Total | % |')
          print('|---------|---------|-------|---|')
          for counter in root.findall('counter'):
              ctype = counter.get('type')
              missed = int(counter.get('missed', 0))
              covered = int(counter.get('covered', 0))
              total = missed + covered
              pct = round(covered / total * 100, 1) if total > 0 else 0
              status = '✅' if pct >= 90 else '⚠️' if pct >= 70 else '❌'
              print(f'| {ctype} | {covered} | {total} | {status} {pct}% |')
          PYEOF
          python3 /tmp/jacoco_summary.py "$REPORT" >> "$GITHUB_STEP_SUMMARY"
