name: Run Maven Tests

on:
  workflow_call:
    inputs:
      container-image:
        required: true
        type: string
      test-command:
        required: true
        type: string
      report-paths:
        required: false
        type: string
        default: ''
      check-name:
        required: false
        type: string
        default: 'Tests'

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          path: src

      - name: Configurar Maven settings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          mkdir -p "${{ github.workspace }}/src/.mvn"
          cat > "${{ github.workspace }}/src/.mvn/ci-settings.xml" <<XMLEOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>$GITHUB_ACTOR</username>
                <password>$GITHUB_TOKEN</password>
              </server>
            </servers>
          </settings>
          XMLEOF

      - name: Run tests
        run: |
          docker run --rm --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/src:/workspace" \
            -w /workspace \
            ${{ inputs.container-image }} \
            sh -c "${{ inputs.test-command }}"

      - name: Publicar resultados
        uses: mikepenz/action-junit-report@v4
        if: ${{ always() && inputs.report-paths != '' }}
        with:
          report_paths: ${{ inputs.report-paths }}
          check_name: ${{ inputs.check-name }}
