name: Run Tests

on:
  workflow_call:
    inputs:
      container-image:
        required: true
        type: string
      test-command:
        required: true
        type: string

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: docker run --rm -v "${{ github.workspace }}:/workspace" -v "$HOME/.m2/settings.xml:/root/.m2/settings.xml:ro" -v "/tmp/npm-cache:/root/.npm" -w /workspace ${{ inputs.container-image }} sh -c "${{ inputs.test-command }}"
